<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6a0fee336f48ec0bfb9b9279/ccdfa1a60_image.png" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/6a0fee336f48ec0bfb9b9279/ccdfa1a60_image.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="manifest" href="/manifest.json" />
    <title>ClearVoice – Noise Suppression</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Listen for force-reload message from the self-destructing service worker.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data && event.data.type === 'FORCE_RELOAD') {
            window.location.reload();
          }
        });
      }
      // Also run the direct cleanup (works once the new HTML is served).
      (async function () {
        var needReload = false;
        if ('serviceWorker' in navigator) {
          try {
            var regs = await navigator.serviceWorker.getRegistrations();
            for (var i = 0; i < regs.length; i++) {
              await regs[i].unregister();
              needReload = true;
            }
          } catch (e) {}
        }
        if ('caches' in window) {
          try {
            var keys = await caches.keys();
            for (var j = 0; j < keys.length; j++) {
              await caches.delete(keys[j]);
              needReload = true;
            }
          } catch (e) {}
        }
        if (needReload && !sessionStorage.getItem('cv_cache_cleared')) {
          sessionStorage.setItem('cv_cache_cleared', '1');
          // Use replace with cache-busting query param to bypass old SW cache
          var freshUrl = window.location.pathname + '?nocache=' + Date.now();
          window.location.replace(freshUrl);
        } else {
          sessionStorage.removeItem('cv_cache_cleared');
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
