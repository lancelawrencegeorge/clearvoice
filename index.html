<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6a0fee336f48ec0bfb9b9279/ccdfa1a60_image.png" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/6a0fee336f48ec0bfb9b9279/ccdfa1a60_image.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>ClearVoice – Noise Suppression</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Kill any stale service workers and caches BEFORE the app loads.
      // This runs synchronously in the HTML so the old cached bundle (which
      // renders a duplicate floating CustomerFilter) never gets to execute.
      (async function () {
        var needReload = false;
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var i = 0; i < regs.length; i++) {
            await regs[i].unregister();
            needReload = true;
          }
        }
        if ('caches' in window) {
          var keys = await caches.keys();
          for (var j = 0; j < keys.length; j++) {
            await caches.delete(keys[j]);
            needReload = true;
          }
        }
        if (needReload) {
          window.location.reload();
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
